name: Crawl Homepage

on:
  workflow_dispatch:

  schedule:
    # Every hour
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: crawl-homepage
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest

    timeout-minutes: 360

    env:
      PYTHONUNBUFFERED: "1"

      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      TARGET_SITE: https://moviehdtv.com

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime folders
        run: |
          mkdir -p cache/html
          mkdir -p cache/json
          mkdir -p logs
          mkdir -p state

      - name: Crawl homepage
        run: |
          python scripts/crawl_pages.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs
          path: logs/

      - name: Commit updated state
        if: always()
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add state/ || true

          git diff --cached --quiet || git commit -m "Update crawler state"

          git push
